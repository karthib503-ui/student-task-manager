---
- name: Deploy Student Task Manager Stack
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Run Docker Compose Stack Lifecycle
      ansible.builtin.shell:
        cmd: |
          docker compose --project-directory "{{ playbook_dir }}" down --remove-orphans
          docker compose --project-directory "{{ playbook_dir }}" build --no-cache
          docker compose --project-directory "{{ playbook_dir }}" up -d