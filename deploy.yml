---
- name: Deploy Student Task Manager Stack
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Ensure the external network mesh exists
      ansible.builtin.shell:
        cmd: docker network create semaphore_default 2>/dev/null || true

    - name: Run Docker Compose Stack Lifecycle
      ansible.builtin.shell:
        cmd: |
          docker compose down --remove-orphans
          docker compose build --no-cache
          docker compose up -d
      environment:
        COMPOSE_FILE: "{{ playbook_dir }}/docker-compose.yml"