---
- name: Deploy Student Task Manager Stack
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Ensure the external network mesh exists
      ansible.builtin.shell:
        cmd: docker network create semaphore_default 2>/dev/null || true

    - name: Run Docker Compose Stack Lifecycle via Native Module
      community.docker.docker_compose_v2:
        project_src: "{{ playbook_dir }}"
        state: present
        build: always