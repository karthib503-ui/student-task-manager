---
- name: Deploy Student Task Manager Stack
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Shut down residual container configurations
      ansible.builtin.shell:
        cmd: docker compose down --remove-orphans
      ignore_errors: true

    - name: Build updated application images
      ansible.builtin.shell:
        cmd: docker compose build --no-cache

    - name: Spin up application services in detached mode
      ansible.builtin.shell:
        cmd: docker compose up -d