# =============================================================
# NGINX CONFIGURATION
# Handles two concerns:
#   1. Serve the React SPA (with HTML5 pushState fallback)
#   2. Proxy /api/* requests to the backend container
# =============================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for faster page loads
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ── Static assets (hashed filenames — cache aggressively) ──
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── API proxy ───────────────────────────────────────────────
    # Docker Compose puts the backend on the internal network as
    # the hostname "backend", port 3001.
    location /api/ {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }

    # ── SPA fallback ────────────────────────────────────────────
    # Any path not matched above returns index.html so React
    # Router can handle client-side navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
