# =============================================================
# DOCKER COMPOSE — Student Task Manager + ELK + Prometheus & Grafana
# Usage:     docker compose up --build -d
# =============================================================

services:

  # ── Backend ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend                      # project root (contains backend/ folder)
      dockerfile: backend.Dockerfile
    container_name: student-task-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
    volumes:
      - sqlite_data:/app/database
    expose:
      - "3001"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"

  # ── Frontend ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend                      # project root (contains frontend/ folder)
      dockerfile: frontend.Dockerfile
    container_name: student-task-frontend
    restart: unless-stopped
    ports:
      - "3005:80"                      # CHANGED from 3000 to 3005 to prevent conflict with Grafana
    networks:
      - app-network
    depends_on:
      backend:
        condition: service_healthy     # wait for backend health check to pass

  # ── ELK Stack ────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m" 
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - app-network

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.1
    container_name: logstash
    volumes:
      - ./logstash/config/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    ports:
      - "5044:5044"
      - "50000:50000/tcp"
      - "50000:50000/udp"
    depends_on:
      - elasticsearch
    networks:
      - app-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.1
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - app-network

  # ── Prometheus & Grafana ─────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - app-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"                    # Kept Grafana on 3000
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin 
    networks:
      - app-network
    depends_on:
      - prometheus

# ── Volumes ───────────────────────────────────────────────────
volumes:
  sqlite_data:
    name: student-task-sqlite
  es-data:
  prometheus-data:
  grafana-data:

# ── Network ───────────────────────────────────────────────────
networks:
  app-network:
    driver: bridge